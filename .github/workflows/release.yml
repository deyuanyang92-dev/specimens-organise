name: Release

# 推送 v* 标签时，在 Windows 和 Linux 上各自构建发布包，
# 并把 zip + 对应的 .sha256 作为 GitHub Release 资产上传。
# 应用内"检查 GitHub 更新"会读取最新 Release 的这些资产。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: python build_release.py --version ${{ steps.ver.outputs.version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 本次更新

            ${{ github.event.head_commit.message }}

            ---

            ## 下载说明

            | 操作系统 | 下载文件 | 使用方式 |
            |---------|---------|--------|
            | **Windows 10/11 64位** | `setup_v${{ steps.ver.outputs.version }}_windows.zip` | 解压 → 双击 `.exe` |
            | **Linux (Ubuntu 20.04+)** | `setup_v${{ steps.ver.outputs.version }}_linux.zip` | 解压 → `chmod +x 文件名 && ./文件名` |

            > **注意**：软件采用目录模式打包，`.exe` 文件必须和 `_internal/` 子目录放在同一层，不能单独复制 `.exe` 运行。

            ---

            ### 其他文件说明（普通用户无需手动下载）

            | 文件 | 用途 |
            |-----|------|
            | `app_v*.zip` | 软件内「检查更新」增量下载用（仅含应用代码） |
            | `runtime_*.zip` | 软件内「检查更新」增量下载用（Qt/Python 运行时） |
            | `*.sha256` | 文件完整性校验码 |
            | `update_manifest_*.json` | 软件内更新检测配置 |

          files: |
            releases/v${{ steps.ver.outputs.version }}/*.zip
            releases/v${{ steps.ver.outputs.version }}/*.zip.sha256
            releases/v${{ steps.ver.outputs.version }}/update_manifest_*.json
